services:

  # ─── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - .:/backend:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php-fpm:
        condition: service_healthy
    restart: unless-stopped

  # ─── PHP-FPM (Laravel) ──────────────────────────────────────────────────────
  php-fpm:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/backend
      - vendor_data:/backend/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["/backend/docker/scripts/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@fsockopen('127.0.0.1', 9000) ? 0 : 1);"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 180s
    restart: unless-stopped
    env_file:
      - .env

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-app}
      POSTGRES_USER: ${DB_USERNAME:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Meilisearch ────────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.7
    environment:
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped

  # ─── Horizon (queue worker) ─────────────────────────────────────────────────
  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/backend
      - vendor_data:/backend/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /backend
    command: ["sh", "-c", "until [ -f /backend/vendor/autoload.php ]; do sleep 3; done && php artisan horizon"]
    restart: unless-stopped
    env_file:
      - .env

  # ─── MCP Server (Claude tool bridge → /api/v1/mcp/*) ────────────────────────
  mcp-server:
    build:
      context: ./mcp-server
    ports:
      - "127.0.0.1:3101:3101"
    environment:
      MCP_HTTP: "1"
      MCP_PORT: "3101"
      MCP_API_KEY: ${MCP_API_KEY:?MCP_API_KEY is required}
      KNXSTORE_API_BASE: "http://nginx/api/v1"
      KNXSTORE_API_TOKEN: ${MCP_SANCTUM_TOKEN:?MCP_SANCTUM_TOKEN is required}
    depends_on:
      - nginx
    restart: unless-stopped

  # ─── MCP Auth Proxy (OAuth 2.1 + Google login in front of mcp-server) ───────
  mcp-auth-proxy:
    image: ghcr.io/sigbit/mcp-auth-proxy:latest
    # Backend target (HTTP/SSE URL form, no trailing path — mcp-auth-proxy
    # mirrors whatever path the client requests onto this origin, so /mcp
    # must NOT be appended here or requests double up on the path).
    command: ["http://mcp-server:3101"]
    ports:
      - "127.0.0.1:3102:3102"
    environment:
      EXTERNAL_URL: "https://mcp.cacylinen.com"
      LISTEN: ":3102"
      NO_AUTO_TLS: "1"
      GOOGLE_CLIENT_ID: ${MCP_AUTH_GOOGLE_CLIENT_ID:?MCP_AUTH_GOOGLE_CLIENT_ID is required}
      GOOGLE_CLIENT_SECRET: ${MCP_AUTH_GOOGLE_CLIENT_SECRET:?MCP_AUTH_GOOGLE_CLIENT_SECRET is required}
      GOOGLE_ALLOWED_USERS: ${MCP_AUTH_ALLOWED_EMAILS:?MCP_AUTH_ALLOWED_EMAILS is required}
      PROXY_BEARER_TOKEN: ${MCP_API_KEY:?MCP_API_KEY is required}
      DATA_PATH: "/data"
    volumes:
      - mcp_auth_proxy_data:/data
    depends_on:
      - mcp-server
    restart: unless-stopped

  # ─── Scheduler (artisan schedule:run every 60s) ──────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/backend
      - vendor_data:/backend/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /backend
    command: ["sh", "-c", "until [ -f /backend/vendor/autoload.php ]; do sleep 3; done && while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    restart: unless-stopped
    env_file:
      - .env

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  vendor_data:
  mcp_auth_proxy_data:
