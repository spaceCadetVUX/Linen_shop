; ─── File uploads ───────────────────────────────────────────────────────────
upload_max_filesize = 10M
post_max_size = 12M

; ─── Memory & timeouts ───────────────────────────────────────────────────────
memory_limit = 256M
max_execution_time = 60
max_input_time = 60

; ─── Error handling (override per environment via APP_DEBUG) ─────────────────
display_errors = Off
log_errors = On
error_log = /proc/self/fd/2

; ─── OPcache (development settings — safe to cache but revalidate) ───────────
; revalidate_freq=2: on Windows/WSL2 bind mounts, opcache's per-file stat()
; check is ~200x slower than on a native filesystem (measured: 0.7ms vs
; 0.0035ms per stat). With revalidate_freq=0 that tax hits every single
; request across ~1600+ included files, adding several seconds/request. At 2s
; it's paid at most once every 2s instead of every request — code edits still
; show up within ~2s, just not instantly. No effect once deployed to a real
; Linux host (no bind-mount translation layer there).
opcache.enable = 1
opcache.revalidate_freq = 2
opcache.validate_timestamps = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000

; ─── Realpath cache ─────────────────────────────────────────────────────────
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; ─── Misc ────────────────────────────────────────────────────────────────────
date.timezone = UTC
short_open_tag = Off
